<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Service indisponible — Épico</title>
  <link rel="apple-touch-icon" href="/icons/logo.png">
  <style>
    /* ─── Variable à modifier pour changer le logo ─── */
    :root {
      --logo-path: url('/icons/logo.png');
      --primary: #669933;
      --primary-light: #eef4e6;
      --text-primary: #2e3d1a;
      --text-muted: #9ca3af;
      --app-bg: #f6f8f3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Space Grotesk', sans-serif;
      background: var(--app-bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      width: 88px;
      height: 88px;
      background-image: var(--logo-path);
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    .code {
      font-size: 5rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    p {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 320px;
    }

    .retry {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }

    .retry:hover { background: #587f2b; }
    .retry:active { transform: scale(0.97); }

    .badge {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--primary);
      background: var(--primary-light);
      padding: 0.4rem 0.8rem;
      border-radius: 9999px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo" role="img" aria-label="Épico"></div>
    <span class="badge">Erreur 502</span>
    <div class="code">502</div>
    <h1>Service momentanément indisponible</h1>
    <p>Le serveur ne répond pas. Cela ne devrait durer que quelques instants — merci de réessayer dans un moment.</p>
    <button class="retry" onclick="location.reload()">Réessayer</button>
  </main>
</body>
</html>
