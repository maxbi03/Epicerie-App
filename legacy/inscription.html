<!DOCTYPE html>
<html class="light" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inscription - L'Épicerie</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="theme.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="min-h-screen flex flex-col p-6 max-w-md mx-auto">

    <div class="flex items-center gap-4 mt-4 mb-8">
        <a href="index.html" class="p-2 rounded-full bg-white dark:bg-white/5 text-gray-900 dark:text-white shadow">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-xl font-bold dark:text-white">Créer mon compte</h1>
    </div>

    <div class="flex-1 flex flex-col justify-center">
        <div class="space-y-4">

            <div class="grid grid-cols-2 gap-3">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">person</span>
                    <input id="reg-firstname" type="text" placeholder="Prénom"
                           class="w-full pl-10 py-4 rounded-2xl border-gray-200 dark:border-white/10 dark:bg-white/5 dark:text-white text-sm">
                </div>

                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">badge</span>
                    <input id="reg-lastname" type="text" placeholder="Nom"
                           class="w-full pl-10 py-4 rounded-2xl border-gray-200 dark:border-white/10 dark:bg-white/5 dark:text-white text-sm">
                </div>
            </div>

            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">mail</span>
                <input id="reg-email" type="email" placeholder="Email"
                       class="w-full pl-10 py-4 rounded-2xl border-gray-200 dark:border-white/10 dark:bg-white/5 dark:text-white text-sm">
            </div>

            <div class="space-y-2">
                <p class="text-[10px] font-black text-primary uppercase ml-2 tracking-widest">Adresse suisse vérifiée</p>

                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-4 text-gray-400">home_pin</span>
                    <input id="reg-address-search" type="text" autocomplete="off"
                           placeholder="Commencez à taper votre adresse suisse"
                           class="w-full pl-10 pr-4 py-4 rounded-2xl border-gray-200 dark:border-white/10 dark:bg-white/5 dark:text-white text-sm">
                </div>

                <div id="address-status" class="hidden text-xs px-3 text-gray-500 dark:text-gray-300"></div>

                <div id="address-suggestions"
                     class="hidden rounded-2xl border border-gray-200 dark:border-white/10 bg-white dark:bg-white/5 overflow-hidden shadow-lg relative z-20"></div>

                <div id="address-selected-card"
                     class="hidden rounded-2xl border border-primary/20 bg-primary/5 px-4 py-3">
                    <div class="flex items-start justify-between gap-3">
                        <div>
                            <p class="text-[10px] font-black text-primary uppercase tracking-widest">Adresse sélectionnée</p>
                            <p id="address-selected-label" class="mt-1 text-sm font-semibold text-gray-900 dark:text-white"></p>
                        </div>

                        <button type="button" id="change-address-btn"
                                class="text-xs font-bold text-primary whitespace-nowrap">
                            Modifier
                        </button>
                    </div>
                </div>

                <input id="reg-address" type="hidden">
                <input id="reg-street" type="hidden">
                <input id="reg-house-number" type="hidden">
                <input id="reg-npa" type="hidden">
                <input id="reg-city" type="hidden">
                <input id="reg-country" type="hidden" value="CH">
                <input id="reg-address-verified" type="hidden" value="false">
            </div>

            <div class="grid grid-cols-3 gap-3">
                <input id="reg-address-preview-npa" type="text" placeholder="NPA" readonly
                       class="w-full px-4 py-4 rounded-2xl border-gray-200 bg-gray-50 dark:bg-white/5 dark:border-white/10 dark:text-white text-sm opacity-80">

                <input id="reg-address-preview-city" type="text" placeholder="Localité" readonly
                       class="col-span-2 w-full px-4 py-4 rounded-2xl border-gray-200 bg-gray-50 dark:bg-white/5 dark:border-white/10 dark:text-white text-sm opacity-80">
            </div>

            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">phone</span>
                <input id="reg-phone" type="tel" placeholder="Numéro de téléphone"
                       class="w-full pl-10 py-4 rounded-2xl border-gray-200 dark:border-white/10 dark:bg-white/5 dark:text-white text-sm">
            </div>

            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">lock</span>
                <input id="reg-password" type="password" placeholder="Mot de passe"
                       class="w-full pl-10 py-4 rounded-2xl border-gray-200 dark:border-white/10 dark:bg-white/5 dark:text-white text-sm">
            </div>

            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">lock</span>
                <input id="reg-password-confirm" type="password" placeholder="Confirmer le mot de passe"
                       class="w-full pl-10 py-4 rounded-2xl border-gray-200 dark:border-white/10 dark:bg-white/5 dark:text-white text-sm">
            </div>

            <div class="flex items-center gap-2">
                <input id="accept-terms" type="checkbox" class="h-4 w-4 text-primary rounded">
                <label for="accept-terms" class="text-xs text-gray-600 dark:text-gray-300">
                    J'accepte les conditions d'utilisation
                </label>
            </div>

            <button id="register-btn" type="button" onclick="handleRegister()"
                    class="w-full bg-primary text-white font-bold py-4 rounded-2xl shadow-lg hover:brightness-105 active:scale-95 transition-all">
                Finaliser l'inscription
            </button>
        </div>

        <div class="text-center mt-6">
            <p class="text-xs text-gray-600 dark:text-gray-300">
                Déjà inscrit ?
                <a href="index.html" class="text-primary font-bold">Se connecter</a>
            </p>
        </div>
    </div>
</div>

<script type="module" src="auth.js"></script>
</body>
</html>
